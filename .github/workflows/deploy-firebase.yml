name: Build & Deploy (Firebase Hosting + Functions)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via Workload Identity
        uses: google-github-actions/auth@v1
        with:
          # Replace these placeholders with values from your GCP Workload Identity setup
          workload_identity_provider: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: SERVICE_ACCOUNT_EMAIL

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci
          if [ -d functions ]; then (cd functions && npm ci) || true; fi

      - name: Build site
        run: npm run build

      - name: Deploy to Firebase (hosting, functions, firestore rules)
        run: |
          npx firebase-tools deploy --only hosting,functions,firestore:rules --project YOUR_PROJECT_ID
