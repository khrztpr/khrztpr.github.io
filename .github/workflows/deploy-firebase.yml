name: Build & Deploy (Firebase Hosting + Functions)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via Workload Identity
        uses: google-github-actions/auth@v1
        with:
          # Replace these placeholders with values from your GCP Workload Identity setup
          workload_identity_provider: projects/test-46743/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deployer@test-46743.iam.gserviceaccount.com

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install
          if [ -d functions ]; then (cd functions && npm install) || true; fi

      - name: Build site
        run: npm run build

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only functions,hosting,firestore:rules --project test-46743
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
