name: Build & Deploy (Pages + Firebase)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-all
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      dist_present: ${{ steps.build.outputs.dist_present }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Upgraded to Node 20 to match Firebase CLI tools

      - name: Install Dependencies
        run: npm install

      - name: Build site
        id: build
        run: |
          npm run build
          if [ -d dist ]; then echo "dist_present=true" >> $GITHUB_OUTPUT; else echo "dist_present=false" >> $GITHUB_OUTPUT; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Upload generic artifact for other jobs
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: './dist'

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (required by Pages action)
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-firebase:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Fix #1: Download the artifact explicitly into a folder named 'dist'
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,firestore:rules --project test-46743
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }} # Fix #2: Corrected indentation layout
